name: Auto-Refresh Ads Data
on:
  schedule:
    - cron: '0 */3 * * *' # Every 3 hours
  workflow_dispatch: # Allows you to run it manually too

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install Dependencies
        run: pip install google-ads-admanager pandas

      - name: Run Fetcher
        env:
          GAM_JSON_KEY: ${{ secrets.GAM_JSON_KEY }} # Put your JSON content in GitHub Secrets
        run: python fetch_gam_data.py

      - name: Commit and Push CSV
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"
          git add gam_report_data.csv
          git commit -m "Auto-update report data"
          git push